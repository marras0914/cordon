apiVersion: v1
kind: Service
metadata:
  name: {{ include "cordon.fullname" . }}
  labels:
    {{- include "cordon.labels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cordon.selectorLabels" . | nindent 4 }}
