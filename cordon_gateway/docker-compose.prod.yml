version: '3.8'

# Production-grade Compose stack: Cordon + OPA + Postgres
# Usage:
#   cp .env.example .env          # fill in secrets
#   docker compose -f docker-compose.prod.yml up -d

services:

  cordon-gateway:
    image: ${CORDON_IMAGE:-your-registry/cordon-gateway:0.1.0}
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      REAL_MCP_SERVER:          ${REAL_MCP_SERVER}
      DATABASE_URL:             postgresql://cordon:${POSTGRES_PASSWORD}@postgres:5432/cordon
      CORDON_OPA_URL:           http://opa:8181
      CORDON_REDACT_PII:        "true"
      CORDON_DASHBOARD_KEY:     ${CORDON_DASHBOARD_KEY}
      CORDON_SESSION_SECRET:    ${CORDON_SESSION_SECRET}
      CORDON_WEBHOOK_URL:       ${CORDON_WEBHOOK_URL:-}
      CORDON_RATE_LIMIT:        ${CORDON_RATE_LIMIT:-60}
      # OIDC (optional — uncomment to enable SSO)
      # CORDON_OIDC_ISSUER:     ${CORDON_OIDC_ISSUER}
      # CORDON_OIDC_CLIENT_ID:  ${CORDON_OIDC_CLIENT_ID}
      # CORDON_OIDC_CLIENT_SECRET: ${CORDON_OIDC_CLIENT_SECRET}
      # CORDON_OIDC_REDIRECT_URI:  ${CORDON_OIDC_REDIRECT_URI}
    volumes:
      - ./policy.yaml:/app/policy.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/dashboard/"]
      interval: 30s
      timeout: 5s
      retries: 3

  opa:
    image: openpolicyagent/opa:0.65.0
    restart: unless-stopped
    volumes:
      - ./policy.rego:/policy.rego:ro
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "/policy.rego"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cordon
      POSTGRES_USER:     cordon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cordon"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
