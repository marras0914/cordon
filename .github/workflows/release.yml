name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cordon-gateway

jobs:
  # ── 1. Tests must pass before anything ships ──────────────────────────────
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          cd cordon_gateway
          pip install -r requirements.txt pytest
          python -m pytest tests/ -q

  # ── 2. Docker image → GHCR ───────────────────────────────────────────────
  docker:
    name: Publish Docker image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./cordon_gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── 3. SDK → PyPI ────────────────────────────────────────────────────────
  pypi:
    name: Publish SDK to PyPI
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build SDK package
        run: |
          pip install build
          python -m build cordon_gateway/sdk_package/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cordon_gateway/sdk_package/dist/

  # ── 4. Helm chart → GitHub Pages (ArtifactHub) ───────────────────────────
  helm:
    name: Package and publish Helm chart
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push to gh-pages branch

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm package cordon_gateway/helm/cordon --destination /tmp/helm-dist

      - name: Publish chart to gh-pages
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: cordon_gateway/helm
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. GitHub Release + source zip ───────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [docker, pypi, helm]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution zip
        run: python build_cordon.py --output dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/cordon_gateway_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
