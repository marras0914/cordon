name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Test (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install SDK deps
        run: npm install --prefix packages/sdk

      - name: Install gateway deps
        run: npm install --prefix packages/gateway

      - name: Run SDK tests
        run: npm test --prefix packages/sdk

      - name: Run gateway tests
        run: npm test --prefix packages/gateway

      - name: Typecheck SDK
        run: npx tsc --project packages/sdk/tsconfig.json --noEmit

  lint:
    name: Biome lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g @biomejs/biome@1.9.4
      - run: biome ci packages/

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint Helm chart
        run: helm lint helm/cordon
