name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test-ts:
    name: Test TS packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: |
          npm install --prefix packages/sdk
          npm install --prefix packages/gateway

      - name: Run SDK tests
        run: npm test --prefix packages/sdk

      - name: Run gateway tests
        run: npm test --prefix packages/gateway

      - name: Typecheck SDK
        run: npx tsc --project packages/sdk/tsconfig.json --noEmit

  test-python:
    name: Test Python gateway (legacy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          cd cordon_gateway
          pip install -r requirements.txt pytest
          python -m pytest tests/ -q --tb=short

  lint:
    name: Biome lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g @biomejs/biome
      - run: biome ci .

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint Helm chart
        run: helm lint cordon_gateway/helm/cordon
